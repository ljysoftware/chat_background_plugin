name: Plugin Validation

on:
  pull_request:
    branches: [dev]

jobs:
  validate:
    name: Validate Plugins
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Download validation script
        run: |
          curl -L \
              -o register-plugins.py \
              "https://raw.githubusercontent.com/${{ vars.PRIVATE_REGISTRY_REPO }}/main/scripts/register-plugins.py"

      - name: Run plugin validation
        run: python register-plugins.py
